title: Suspicious MSHTA Execution
id: 6f4d8c1a-5e7b-4a9c-b123-004mshta
status: experimental
description: Detects execution of mshta.exe which can be abused by attackers to execute malicious scripts through a trusted Windows binary.
author: Home SOC Lab
date: 2026/07/16

references:
    - https://attack.mitre.org/techniques/T1218/005/

tags:
    - attack.defense_evasion
    - attack.t1218.005

logsource:
    product: windows
    category: process_creation

detection:
    selection:
        Image|endswith:
            - '\mshta.exe'

    condition:
        selection

falsepositives:
    - Legitimate HTML Application execution
    - Internal administrative scripts

level: medium